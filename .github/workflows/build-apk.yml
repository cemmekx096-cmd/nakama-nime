name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Bisa trigger manual dari GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission untuk gradlew
      - name: Grant Gradle permission
        run: chmod +x gradlew

      # 4. Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. Build release APK (unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 7. Upload debug APK sebagai artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nakama-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # 8. Upload release APK sebagai artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nakama-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30