name: Release APK

on:
  push:
    tags:
      - 'v*'   # trigger saat push tag: v0.1.1.1, v0.2.0.0, dll

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Buat GitHub Release + upload APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nakama ${{ github.ref_name }}"
          body: |
            ## Nakama ${{ github.ref_name }}

            ### Cara install
            1. Download APK di bawah
            2. Izinkan install dari sumber tidak dikenal
            3. Install APK

            ### Changelog
            ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}